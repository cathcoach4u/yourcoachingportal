<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strengths Hub | Your Coaching Portal</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#003366">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Coach Portal">
  <link rel="apple-touch-icon" href="icon.svg">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.1/dist/umd/supabase.min.js"
    integrity="sha384-sfbOag7cEcqn2DK53T/iBNAH/2cMCf7bSzJDwBhV117A0z/NIj9Usei1jKIBY1Ae"
    crossorigin="anonymous"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Aptos', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f7fa; color: #333; min-height: 100vh;
      display: flex; flex-direction: column;
    }
    header {
      background: #003366; color: white; padding: 14px 20px;
      display: flex; justify-content: space-between; align-items: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15); gap: 12px;
    }
    .header-left { display: flex; align-items: center; gap: 14px; min-width: 0; }
    .header-title { font-size: 18px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .back-arrow {
      color: rgba(255,255,255,0.85); text-decoration: none; font-size: 13px;
      padding: 6px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.25);
      white-space: nowrap;
    }
    .back-arrow:hover { background: rgba(255,255,255,0.12); color: white; }
    .logout-btn {
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
      color: white; padding: 6px 14px; border-radius: 6px; cursor: pointer;
      font-size: 13px; font-family: inherit; font-weight: 500; white-space: nowrap;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.25); }
    .content {
      flex: 1; padding: 24px 16px; max-width: 1100px; margin: 0 auto; width: 100%;
    }
    .page-banner {
      background: linear-gradient(135deg, #003366 0%, #005599 100%);
      color: white; border-radius: 12px; padding: 24px 20px; margin-bottom: 28px;
    }
    .page-banner h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .page-banner p { font-size: 13px; opacity: 0.9; line-height: 1.55; }
    .hub-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }
    .hub-tile {
      background: white; border: 2px solid #0D9488; border-radius: 12px;
      padding: 22px 20px; display: flex; flex-direction: column;
      text-decoration: none; color: inherit;
      box-shadow: 0 2px 8px rgba(13,148,136,0.12); transition: transform 0.2s, box-shadow 0.2s;
    }
    .hub-tile:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(13,148,136,0.2); }
    .hub-tile-icon { font-size: 32px; line-height: 1; margin-bottom: 12px; }
    .hub-tile-title { font-size: 17px; font-weight: 700; color: #003366; margin-bottom: 6px; }
    .hub-tile-desc { font-size: 13px; color: #777; line-height: 1.5; margin-bottom: 14px; flex-grow: 1; }
    .hub-tile-arrow { font-size: 13px; font-weight: 700; color: #0D9488; align-self: flex-start; margin-top: auto; }
    footer {
      text-align: center; padding: 20px 16px; font-size: 12px; color: #bbb;
      border-top: 1px solid #eee; background: white;
    }
    footer a { color: #0D9488; text-decoration: none; }
    @media (max-width: 480px) {
      .header-title { font-size: 15px; }
      .page-banner h1 { font-size: 18px; }
      .hub-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <a class="back-arrow" href="./">← Back</a>
      <div class="header-title">Strengths Hub</div>
    </div>
    <button class="logout-btn" onclick="logout()">Sign Out</button>
  </header>
  <div class="content">
    <div class="page-banner">
      <h1>Your Strengths Hub</h1>
      <p>Curated tools that help you understand and use your strengths between coaching sessions.</p>
    </div>
    <div class="hub-grid">
      <a class="hub-tile" href="strengths-clifton.html">
        <span class="hub-tile-icon">💪</span>
        <span class="hub-tile-title">CliftonStrengths</span>
        <span class="hub-tile-desc">Your Top 10 themes, domain mix, and what each theme means and brings to a team.</span>
        <span class="hub-tile-arrow">Open →</span>
      </a>
    </div>
  </div>
  <footer>
    <a href="https://coach4u.com.au" target="_blank">coach4u.com.au</a> &nbsp;|&nbsp; Strengths-Based Coaching and Counselling
  </footer>
  <script>
    const SUPABASE_URL = 'https://eekefsuaefgpqmjdyniy.supabase.co'
    const SUPABASE_ANON = 'sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y'
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON)

    async function logout() {
      await sb.auth.signOut()
      location.href = './'
    }

    sb.auth.getSession().then(({ data: { session } }) => {
      if (!session) location.href = './'
    })

    sb.auth.onAuthStateChange((event) => {
      if (event === 'SIGNED_OUT') location.href = './'
    })

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js')
  </script>
</body>
</html>
