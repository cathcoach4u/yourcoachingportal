<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Coach4U — Account Inactive</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1B3664">

  <style>
    :root {
      --primary:    #1B3664;
      --accent:     #5684C4;
      --text:       #2D2D2D;
      --text-muted: #6C757D;
      --font-head:  'Inter', 'Aptos', 'Calibri', sans-serif;
      --font-body:  'Montserrat', 'Aptos', 'Calibri', sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: linear-gradient(135deg, #1B3664 0%, #5684C4 100%);
      font-family: var(--font-body);
      color: var(--text);
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 16px;
      padding: 36px 32px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      text-align: center;
    }
    h1 {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 28px;
      color: var(--primary);
      margin: 0 0 12px 0;
    }
    p {
      font-family: var(--font-body);
      font-size: 15px;
      color: var(--text-muted);
      margin: 0 0 16px 0;
      line-height: 1.5;
    }
    .login-btn {
      display: inline-block;
      margin-top: 12px;
      padding: 12px 24px;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 15px;
      color: #fff;
      background: var(--primary);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
    }
    .login-btn:hover { background: #142849; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>Account inactive</h1>
    <p>Your account is signed in, but membership is not currently active.</p>
    <p>Please contact Cath to activate access: <a href="mailto:cath@coach4u.com.au" style="color: var(--accent);">cath@coach4u.com.au</a></p>
    <button class="login-btn" onclick="signOut()">Sign Out</button>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const supabase = createClient(
      'https://eekefsuaefgpqmjdyniy.supabase.co',
      'sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y'
    );

    window.signOut = async () => {
      await supabase.auth.signOut();
      window.location.href = 'login.html';
    };
  </script>
</body>
</html>
