<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Coach4U — Reset Password</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1B3664">

  <style>
    :root {
      --primary:    #1B3664;
      --accent:     #5684C4;
      --text:       #2D2D2D;
      --text-muted: #6C757D;
      --divider:    #DDDDDD;
      --font-head:  'Inter', 'Aptos', 'Calibri', sans-serif;
      --font-body:  'Montserrat', 'Aptos', 'Calibri', sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: linear-gradient(135deg, #1B3664 0%, #5684C4 100%);
      font-family: var(--font-body);
      color: var(--text);
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 16px;
      padding: 36px 32px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
    }
    .login-logo h1 {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 36px;
      color: var(--primary);
      text-align: center;
      margin: 0 0 4px 0;
    }
    .login-title {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 22px;
      color: var(--primary);
      text-align: center;
      margin: 12px 0 4px 0;
    }
    .login-subtitle {
      font-family: var(--font-body);
      font-weight: 400;
      font-size: 15px;
      color: var(--text-muted);
      text-align: center;
      margin: 0 0 24px 0;
    }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      font-family: var(--font-body);
      font-weight: 400;
      font-size: 15px;
      color: var(--text);
      background: #fff;
      border: 1px solid var(--divider);
      border-radius: 8px;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(86, 132, 196, 0.2);
    }
    .login-btn {
      width: 100%;
      padding: 14px;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 16px;
      color: #fff;
      background: var(--primary);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 8px;
    }
    .login-btn:hover { background: #142849; }
    .login-message {
      font-family: var(--font-body);
      font-size: 14px;
      margin: 10px 0;
      min-height: 1.2em;
    }
    .login-message.error { color: #B00020; }
    .login-message.success { color: #1B5E20; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo"><h1>Business Coach4U</h1></div>
    <p class="login-title">Reset password</p>
    <p class="login-subtitle">Enter your new password below.</p>

    <form id="resetForm">
      <div class="form-group">
        <label for="password">New password</label>
        <input type="password" id="password" required minlength="8" autocomplete="new-password">
      </div>
      <div id="message" class="login-message"></div>
      <button type="submit" class="login-btn">Update Password</button>
    </form>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const supabase = createClient(
      'https://eekefsuaefgpqmjdyniy.supabase.co',
      'sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y'
    );

    // Supabase picks up the recovery token from the URL hash automatically
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const msg = document.getElementById('message');

      const { error } = await supabase.auth.updateUser({ password });
      if (error) {
        msg.className = 'login-message error';
        msg.textContent = error.message;
      } else {
        msg.className = 'login-message success';
        msg.textContent = 'Password updated. Redirecting to sign in...';
        setTimeout(() => window.location.href = 'login.html', 2000);
      }
    });
  </script>
</body>
</html>
