<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Coaching Portal — Set New Password</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#003366">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Coach Portal">
  <link rel="apple-touch-icon" href="icon.svg">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.1/dist/umd/supabase.min.js"
    integrity="sha384-sfbOag7cEcqn2DK53T/iBNAH/2cMCf7bSzJDwBhV117A0z/NIj9Usei1jKIBY1Ae"
    crossorigin="anonymous"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Aptos', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f7fa; color: #333; min-height: 100vh;
    }
    header {
      background: #003366; color: white; padding: 14px 20px;
      display: flex; justify-content: space-between; align-items: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    .header-title { font-size: 18px; font-weight: 700; }
    .login-wrap {
      min-height: calc(100vh - 120px); display: flex; align-items: center; justify-content: center; padding: 24px 16px;
    }
    .login-box {
      background: white; border-radius: 14px; padding: 36px 28px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1); width: 100%; max-width: 400px;
    }
    .login-logo { text-align: center; margin-bottom: 20px; }
    .login-logo h1 { font-size: 24px; font-weight: 700; color: #003366; letter-spacing: -0.5px; }
    .login-title { font-size: 16px; font-weight: 700; color: #003366; margin-bottom: 6px; text-align: center; }
    .login-sub { font-size: 13px; color: #999; margin-bottom: 28px; line-height: 1.5; text-align: center; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
    .password-wrapper { position: relative; }
    .form-group input {
      width: 100%; padding: 11px 13px; border: 1.5px solid #e0e0e0;
      border-radius: 8px; font-size: 16px; font-family: inherit; transition: border-color 0.2s;
    }
    .form-group input:focus { outline: none; border-color: #0D9488; }
    .toggle-password {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: #999;
      font-size: 13px; padding: 4px; font-family: inherit;
    }
    .toggle-password:hover { color: #0D9488; }
    .btn-primary {
      background: #003366; color: white; padding: 13px; border: none;
      border-radius: 8px; font-size: 15px; font-weight: 700; font-family: inherit;
      cursor: pointer; width: 100%; transition: background 0.2s; margin-top: 4px;
    }
    .btn-primary:hover { background: #002244; }
    .btn-primary:disabled { background: #aaa; cursor: not-allowed; }
    .msg { font-size: 13px; margin-top: 14px; text-align: center; line-height: 1.5; padding: 10px; border-radius: 6px; }
    .msg.error { color: #c62828; background: #fff0f0; }
    .msg.success { color: #0D9488; background: #e6f4f1; }
    .back-link {
      display: block; text-align: center; margin-top: 16px; font-size: 13px;
      color: #0D9488; text-decoration: none;
    }
    .back-link:hover { text-decoration: underline; }
    footer {
      text-align: center; padding: 20px 16px; font-size: 12px; color: #bbb;
      border-top: 1px solid #eee; background: white;
      position: sticky; top: 100vh;
    }
    footer a { color: #0D9488; text-decoration: none; }
    @media (max-width: 480px) {
      .login-box { padding: 28px 20px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-title">Your Coaching Portal</div>
  </header>

  <div class="login-wrap">
    <div class="login-box">
      <div class="login-logo"><h1>Your Coaching Portal</h1></div>
      <p class="login-title">Set a new password</p>
      <p class="login-sub">Choose a password that's at least 8 characters.</p>
      <form id="resetForm" onsubmit="handleReset(event)">
        <div class="form-group">
          <label>New password</label>
          <div class="password-wrapper">
            <input type="password" id="password" required minlength="8" autocomplete="new-password">
            <button type="button" class="toggle-password" id="togglePw">Show</button>
          </div>
        </div>
        <div class="msg" id="resetMsg" style="display:none"></div>
        <button type="submit" class="btn-primary" id="resetBtn">Update Password</button>
      </form>
      <a class="back-link" href="index.html">&#8592; Back to sign in</a>
    </div>
  </div>

  <footer>
    <a href="https://coach4u.com.au" target="_blank">coach4u.com.au</a> &nbsp;|&nbsp; Strengths-Based Coaching and Counselling
  </footer>

  <script>
    const SUPABASE_URL  = 'https://eekefsuaefgpqmjdyniy.supabase.co'
    const SUPABASE_ANON = 'sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y'
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON)

    const pwInput  = document.getElementById('password')
    const toggleBtn = document.getElementById('togglePw')

    toggleBtn.addEventListener('click', () => {
      if (pwInput.type === 'password') { pwInput.type = 'text'; toggleBtn.textContent = 'Hide' }
      else { pwInput.type = 'password'; toggleBtn.textContent = 'Show' }
    })

    async function handleReset(event) {
      event.preventDefault()
      const btn   = document.getElementById('resetBtn')
      const msgEl = document.getElementById('resetMsg')
      btn.disabled = true
      btn.textContent = 'Updating…'
      msgEl.style.display = 'none'
      msgEl.className = 'msg'

      const { error } = await sb.auth.updateUser({ password: pwInput.value })

      msgEl.style.display = 'block'
      if (error) {
        msgEl.classList.add('error')
        msgEl.textContent = error.message
        btn.disabled = false
        btn.textContent = 'Update Password'
      } else {
        msgEl.classList.add('success')
        msgEl.textContent = 'Password updated. Taking you to sign in…'
        setTimeout(() => window.location.href = 'index.html', 2000)
      }
    }
  </script>
</body>
</html>
